<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Enrollment Submissions — Admin</title>
  <style>
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f7fb;
      color: #1f2d45;
      line-height: 1.6;
    }

    .container {
      width: min(1140px, calc(100% - 2rem));
      margin: 0 auto;
      padding: 3rem 0 4rem;
    }

    header {
      margin-bottom: 2rem;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 3vw, 2.75rem);
    }

    p {
      margin: 0.75rem 0 0;
      max-width: 780px;
      color: #4f617d;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin: 1.75rem 0;
      align-items: center;
    }

    .toolbar a {
      color: #2a5d9f;
      text-decoration: none;
      font-weight: 600;
    }

    .table-wrapper {
      overflow-x: auto;
      background: #ffffff;
      border: 1px solid #e4e9f2;
      border-radius: 24px;
      box-shadow: 0 18px 40px rgba(33, 45, 67, 0.08);
      padding: 1rem;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 860px;
    }

    th,
    td {
      padding: 1rem 0.85rem;
      text-align: left;
      vertical-align: top;
      border-bottom: 1px solid #edf1f7;
    }

    th {
      color: #3d4f6e;
      font-weight: 700;
      background: #f8fafc;
    }

    td {
      color: #4d5e7c;
      white-space: pre-wrap;
    }

    tr:last-child td {
      border-bottom: none;
    }

    .empty-state {
      padding: 2rem;
      text-align: center;
      color: #66789c;
    }

    .badge {
      display: inline-flex;
      padding: 0.35rem 0.75rem;
      border-radius: 999px;
      background: #eef2ff;
      color: #2a5d9f;
      font-weight: 700;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <main class="container">
    <header>
      <h1>Enrollment Submissions</h1>
      <p>Review the latest student enrollment applications saved from the website form. Use the admin page to confirm and follow up with families.</p>
    </header>

    <div class="toolbar">
      <span class="badge" id="submission-count">Loading...</span>
      <a href="/">Back to site</a>
    </div>

    <div class="table-wrapper">
      <table id="submission-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Submitted At</th>
            <th>Student</th>
            <th>Grade</th>
            <th>DOB</th>
            <th>Gender</th>
            <th>Parent</th>
            <th>Phone</th>
            <th>Email</th>
            <th>Term</th>
            <th>Notes</th>
          </tr>
        </thead>
        <tbody id="submission-body">
          <tr>
            <td colspan="11" class="empty-state">Loading submissions...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>

  <script>
    const body = document.getElementById('submission-body');
    const count = document.getElementById('submission-count');
    const params = new URLSearchParams(window.location.search);
    const secret = params.get('secret');
    const apiUrl = '/api/submissions' + (secret ? `?secret=${encodeURIComponent(secret)}` : '');

    async function loadSubmissions() {
      try {
        const response = await fetch(apiUrl);
        const data = await response.json();

        if (!response.ok) {
          body.innerHTML = `<tr><td colspan="11" class="empty-state">${data.error || 'Unable to load submissions.'}</td></tr>`;
          count.textContent = 'Error';
          return;
        }

        if (!data.length) {
          body.innerHTML = `<tr><td colspan="11" class="empty-state">No submissions found yet.</td></tr>`;
          count.textContent = '0 submissions';
          return;
        }

        count.textContent = `${data.length} submission${data.length === 1 ? '' : 's'}`;
        body.innerHTML = data
          .map((item, index) => {
            const s = item.data;
            return `
              <tr>
                <td>${index + 1}</td>
                <td>${new Date(item.submittedAt).toLocaleString()}</td>
                <td>${s.student_name || '—'}</td>
                <td>${s.grade_level || '—'}</td>
                <td>${s.birth_date || '—'}</td>
                <td>${s.gender || '—'}</td>
                <td>${s.guardian_name || '—'}</td>
                <td>${s.parent_phone || '—'}</td>
                <td>${s.parent_email || '—'}</td>
                <td>${s.start_term || '—'}</td>
                <td>${s.notes ? s.notes.replace(/\n/g, '<br>') : '—'}</td>
              </tr>
            `;
          })
          .join('');
      } catch (error) {
        body.innerHTML = `<tr><td colspan="11" class="empty-state">${error.message}</td></tr>`;
        count.textContent = 'Error';
      }
    }

    loadSubmissions();
  </script>
</body>
</html>
